server {
    server_name pet.luomor.com;
    listen 80;
    listen 443 ssl http2;

    include /etc/nginx/conf/ssl.conf;
    include /etc/nginx/conf/ssl-luomor-com.conf;

    error_log /var/log/nginx/ai_error_log warn;
    access_log /var/log/nginx/ai_access_log main;

    charset utf-8;

    root /home/luomor/git/pet-web/webroot;
    index index.html;
    
    location / {
        try_files $uri $uri/ /index.html;
    }
    
    # API 代理到后端
    location /api {
        proxy_pass http://localhost:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
    }
}

server {
    server_name pet.7otech.com www.7otech.com 7otech.com;
    listen 80;
    listen 443 ssl http2;

    client_max_body_size 50m;

    include /etc/nginx/conf/ssl.conf;
    include /etc/nginx/conf/ssl-7otech-com.conf;

    error_log /var/log/nginx/blog_error.log warn;
